plugins {
    id 'com.android.application'
}

android {
    namespace 'com.caravaneo.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.caravaneo.app"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug  // Use debug signing for easy sideloading
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // Bundle web assets without compression (faster WebView loading)
    aaptOptions {
        noCompress 'js', 'css', 'html', 'json', 'gpx'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.activity:activity:1.8.2'
}
